name: Book tee time

on:
  schedule:
    # 10 PM MYT (UTC+8) = 14:00 UTC. Run 5 min early so the runner is warm.
    - cron: "55 13 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY/MM/DD). Leave empty for 1 week ahead."
        required: false
      cutoff:
        description: "Only book slots before this time (e.g. 8:15, 7:30)"
        required: false
      timeout:
        description: "Max retry duration (e.g. 10m, 5m)"
        required: false

jobs:
  book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o bin/fore-cast ./cmd/cli

      - name: Book tee time
        env:
          FORE_CAST_USER: ${{ secrets.FORE_CAST_USER }}
          FORE_CAST_PASSWORD: ${{ secrets.FORE_CAST_PASSWORD }}
        run: |
          ARGS="-user $FORE_CAST_USER -password $FORE_CAST_PASSWORD"
          ARGS="$ARGS -retry -retry-interval 1"

          if [ -n "${{ inputs.timeout }}" ]; then
            ARGS="$ARGS -timeout ${{ inputs.timeout }}"
          fi

          if [ -n "${{ inputs.date }}" ]; then
            ARGS="$ARGS -date ${{ inputs.date }}"
          fi

          if [ -n "${{ inputs.cutoff }}" ]; then
            ARGS="$ARGS -cutoff ${{ inputs.cutoff }}"
          fi

          ./bin/fore-cast $ARGS
